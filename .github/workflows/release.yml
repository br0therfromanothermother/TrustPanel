name: release

# Build the release artifacts and publish them on a GitHub Release so operators
# can install straight from GitHub (see scripts/install.sh) instead of copying
# binaries by hand. Triggered by pushing a version tag, e.g.:
#
#   git tag v0.1.0 && git push origin v0.1.0
#
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  trustpanel:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: build trustpanel (linux/${{ matrix.arch }})
        env:
          GOOS: linux
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: "0"
        run: go build -buildvcs=false -trimpath -ldflags "-s -w" -o trustpanel-linux-${{ matrix.arch }} ./cmd/trustpanel
      - uses: actions/upload-artifact@v4
        with:
          name: trustpanel-linux-${{ matrix.arch }}
          path: trustpanel-linux-${{ matrix.arch }}

  # Best-effort: trusttunnel_endpoint is a Rust binary built from the upstream
  # repo plus our reverse-proxy patch. If upstream drifts and the patch no longer
  # applies, this job fails without blocking the release (operators can attach the
  # binary manually). Pin TRUSTTUNNEL_REPO_URL/ref in the script for reproducibility.
  #
  # Pinned to 22.04 (glibc 2.35), not ubuntu-latest: the binary links glibc
  # dynamically (it depends on BoringSSL via quiche/boring, which rules out a
  # quick musl static build), so it refuses to start on any target older than
  # whatever glibc the build host shipped — ubuntu-latest (24.04, glibc 2.39)
  # breaks on the still-common 22.04.
  trusttunnel:
    runs-on: ubuntu-22.04
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: build trusttunnel_endpoint (linux/amd64)
        run: bash scripts/build-trusttunnel.sh
      - run: mv bin/trusttunnel_endpoint trusttunnel_endpoint-linux-amd64
      - uses: actions/upload-artifact@v4
        with:
          name: trusttunnel_endpoint-linux-amd64
          path: trusttunnel_endpoint-linux-amd64

  # sing-box must be built with the with_v2ray_api tag (per-user traffic stats on
  # entry nodes); the upstream release binary omits it. Build from source, pinned.
  singbox:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    env:
      SINGBOX_VERSION: v1.13.13
    steps:
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: build sing-box (with_v2ray_api)
        env:
          GOOS: linux
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: "0"
        run: |
          # GOBIN must stay unset: `go install` refuses to cross-compile once GOBIN
          # is set, so this relies on the default $(go env GOPATH)/bin, where a
          # cross-compiled target lands in a $GOOS_$GOARCH subdirectory and a
          # native one lands directly in bin.
          go install -trimpath \
            -tags "with_gvisor with_quic with_dhcp with_wireguard with_utls with_acme with_clash_api with_v2ray_api" \
            github.com/sagernet/sing-box/cmd/sing-box@${SINGBOX_VERSION}
          GOBIN="$(go env GOPATH)/bin"
          mv "$GOBIN/${GOOS}_${GOARCH}/sing-box" sing-box-linux-${{ matrix.arch }} 2>/dev/null \
            || mv "$GOBIN/sing-box" sing-box-linux-${{ matrix.arch }}
      - uses: actions/upload-artifact@v4
        with:
          name: sing-box-linux-${{ matrix.arch }}
          path: sing-box-linux-${{ matrix.arch }}

  release:
    # trusttunnel is included so this waits for it (avoiding a race with its
    # artifact upload); its own continue-on-error means a failure there still
    # won't block this job.
    needs: [trustpanel, singbox, trusttunnel]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: generate SHA256SUMS
        run: |
          cd dist
          chmod +x trustpanel-linux-* trusttunnel_endpoint-* 2>/dev/null || true
          sha256sum * > SHA256SUMS
          cat SHA256SUMS
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          fail_on_unmatched_files: true
          generate_release_notes: true
